version: '3.9'

services:

  postgres:
    image: postgres:16-alpine
    container_name: rentcar-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: rentcar
      POSTGRES_USER: ${POSTGRES_USER:-rentcar_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-rentcar_pass}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-rentcar_user} -d rentcar"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rentcar-app
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      POSTGRES_URL: jdbc:postgresql://postgres:5432/rentcar
      POSTGRES_USER: ${POSTGRES_USER:-rentcar_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-rentcar_pass}
      SPRING_MAIL_HOST: ${MAIL_HOST:-smtp.gmail.com}
      SPRING_MAIL_PORT: ${MAIL_PORT:-587}
      SPRING_MAIL_USERNAME: ${MAIL_USERNAME}
      SPRING_MAIL_PASSWORD: ${MAIL_PASSWORD}
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

volumes:
  postgres_data:
